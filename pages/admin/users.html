<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management — ShopHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <script>(function(){const s=localStorage.getItem('sh_session');if(!s){window.location.href='/login.html';return;}try{const p=JSON.parse(s);if(p.role!=='admin')window.location.href='/login.html';}catch{window.location.href='/login.html';}})()</script>
</head>
<body>
<div id="sh-nav"></div>

<div class="dash-page">
  <div class="dash-content">
    <div class="dash-title">👥 User Management</div>
    <div class="dash-subtitle">Enable, disable and reset passwords for registered users</div>

    <div class="filter-bar mb-4 d-flex align-items-center gap-2 flex-wrap">
      <span class="fw-bold text-muted small me-2">Filter:</span>
      <button class="category-pill active" id="filter-all"      onclick="setFilter('')">All Users</button>
      <button class="category-pill"        id="filter-seller"   onclick="setFilter('seller')">Sellers</button>
      <button class="category-pill"        id="filter-buyer"    onclick="setFilter('buyer')">Buyers</button>
      <button class="category-pill"        id="filter-active"   onclick="setFilter('active')">Active</button>
      <button class="category-pill"        id="filter-disabled" onclick="setFilter('disabled')">Disabled</button>
      <div class="ms-auto">
        <input type="text" id="search-user" class="form-control form-control-sm" placeholder="Search username…" style="width:180px"/>
      </div>
    </div>

    <div class="table-card">
      <div class="card-heading">
        <span>Registered Users</span>
        <span id="user-count" class="text-muted small fw-normal"></span>
      </div>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr><th>Username</th><th>Role</th><th>Email</th><th>Shop Name</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
      <div id="users-empty" class="empty-state" style="display:none">
        <div class="empty-icon">👥</div><div class="empty-text">No users found</div>
      </div>
    </div>
  </div>
</div>

<!-- Reset Password Modal -->
<div class="modal fade" id="resetModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Reset Password</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        Reset password for <strong id="reset-username"></strong>?
        <div class="mt-2 p-2 rounded" style="background:#f8f9fa;font-size:13px">New password: <code class="fw-bold">123456</code></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-warning btn-sm" id="confirm-reset-btn">Reset</button>
      </div>
    </div>
  </div>
</div>

<!-- Toggle Modal -->
<div class="modal fade" id="toggleModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="toggle-modal-title">Disable Account</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" id="toggle-modal-body">Are you sure?</div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm" id="confirm-toggle-btn">Confirm</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/core/constants.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/utils.js"></script>
<script src="/js/components/nav.js"></script>
<script src="/js/pages/admin/users.js"></script>
</body>
</html>
