<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announcements — ShopHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <script>(function(){const s=localStorage.getItem('sh_session');if(!s){window.location.href='/login.html';return;}try{const p=JSON.parse(s);if(p.role!=='admin')window.location.href='/login.html';}catch{window.location.href='/login.html';}})()</script>
</head>
<body>
<div id="sh-nav"></div>

<div class="dash-page">
  <div class="dash-content">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <div class="dash-title">📢 Announcements</div>
      <button class="btn btn-sm" style="background:var(--primary);color:#fff;" onclick="openModal()">
        <i class="bi bi-plus-circle me-1"></i> New Announcement
      </button>
    </div>
    <div class="dash-subtitle">Posts shown on the storefront homepage</div>

    <div class="table-card">
      <div class="card-heading">
        <span>Published</span>
        <span id="ann-count" class="text-muted small fw-normal"></span>
      </div>
      <div id="ann-empty" class="empty-state" style="display:none">
        <div class="empty-icon">📢</div>
        <div class="empty-text">No announcements yet</div>
        <div class="empty-sub">Click "New Announcement" to publish one</div>
      </div>
      <div id="ann-list"></div>
    </div>
  </div>
</div>

<!-- Add modal -->
<div class="modal fade" id="annModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">New Announcement</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-bold">Title <span class="text-danger">*</span></label>
          <input type="text" id="a-title" class="form-control" placeholder="e.g. 🎉 Spring Sale is Live!" maxlength="200"/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Content</label>
          <textarea id="a-content" class="form-control" rows="4" placeholder="Optional details visible to all visitors…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn text-white" style="background:var(--primary)" onclick="saveAnn()">Publish</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete modal -->
<div class="modal fade" id="delModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Delete announcement?</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">This will remove it from the storefront immediately.</div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirm-del-btn">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/core/constants.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/utils.js"></script>
<script src="/js/components/nav.js"></script>
<script src="/js/pages/admin/announcements.js"></script>
</body>
</html>
