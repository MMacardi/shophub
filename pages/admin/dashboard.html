<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — ShopHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <script>(function(){const s=localStorage.getItem('sh_session');if(!s){window.location.href='/login.html';return;}try{const p=JSON.parse(s);if(p.role!=='admin')window.location.href='/login.html';}catch{window.location.href='/login.html';}})()</script>
</head>
<body>
<div id="sh-nav"></div>

<div class="dash-page">
  <div class="dash-content">
    <div class="dash-title">👑 Admin Dashboard</div>
    <div class="dash-subtitle">System overview and management</div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-2"><div class="stat-card orange"><div><div class="stat-value" id="st-users">0</div><div class="stat-label">Total Users</div></div></div></div>
      <div class="col-6 col-md-2"><div class="stat-card green"><div><div class="stat-value" id="st-sellers">0</div><div class="stat-label">Sellers</div></div></div></div>
      <div class="col-6 col-md-2"><div class="stat-card blue"><div><div class="stat-value" id="st-buyers">0</div><div class="stat-label">Buyers</div></div></div></div>
      <div class="col-6 col-md-2"><div class="stat-card purple"><div><div class="stat-value" id="st-products">0</div><div class="stat-label">Products</div></div></div></div>
      <div class="col-6 col-md-2"><div class="stat-card teal"><div><div class="stat-value" id="st-orders">0</div><div class="stat-label">Orders</div></div></div></div>
      <div class="col-6 col-md-2"><div class="stat-card orange"><div><div class="stat-value" id="st-disabled">0</div><div class="stat-label">Disabled</div></div></div></div>
    </div>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="table-card h-100">
          <div class="card-heading">Quick Actions</div>
          <div class="d-grid gap-2">
            <a href="/pages/admin/users.html"         class="btn btn-sm" style="background:var(--primary);color:#fff;"><i class="bi bi-people me-1"></i> Manage Users</a>
            <a href="/pages/admin/announcements.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-megaphone me-1"></i> Announcements</a>
            <a href="/"                               class="btn btn-outline-secondary btn-sm"><i class="bi bi-shop me-1"></i> View Storefront</a>
          </div>
          <hr/>
          <div class="text-muted small">
            <div class="fw-bold mb-2">Admin Credentials:</div>
            <div>Username: <code>admin</code></div>
            <div>Role: Built-in (cannot be disabled)</div>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="table-card h-100">
          <div class="card-heading">Recent Registrations</div>
          <div class="table-responsive">
            <table class="table">
              <thead><tr><th>Username</th><th>Role</th><th>Email</th><th>Status</th><th>Joined</th></tr></thead>
              <tbody id="recent-users-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/core/constants.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/utils.js"></script>
<script src="/js/components/nav.js"></script>
<script src="/js/pages/admin/dashboard.js"></script>
</body>
</html>
