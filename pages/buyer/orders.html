<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders — ShopHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <script>(function(){const s=localStorage.getItem('sh_session');if(!s){window.location.href='/login.html';return;}try{const p=JSON.parse(s);if(p.role!=='buyer')window.location.href='/login.html';}catch{window.location.href='/login.html';}})()</script>
</head>
<body>
<div id="sh-nav"></div>

<div class="dash-page">
  <div class="dash-content">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <div class="dash-title">📋 My Orders</div>
      <a href="/" class="btn btn-sm" style="background:var(--primary);color:#fff;">Continue Shopping</a>
    </div>
    <div class="dash-subtitle">Your purchase history</div>

    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3"><div class="stat-card orange"><div><div class="stat-value" id="st-orders">0</div><div class="stat-label">Total Orders</div></div><div class="stat-icon">📦</div></div></div>
      <div class="col-6 col-md-3"><div class="stat-card blue"><div><div class="stat-value" id="st-spent">¥0</div><div class="stat-label">Total Spent</div></div><div class="stat-icon">💳</div></div></div>
      <div class="col-6 col-md-3"><div class="stat-card green"><div><div class="stat-value" id="st-items">0</div><div class="stat-label">Items Bought</div></div><div class="stat-icon">🛒</div></div></div>
      <div class="col-6 col-md-3"><div class="stat-card purple"><div><div class="stat-value" id="wallet-bal">¥0</div><div class="stat-label">Wallet Balance</div></div><div class="stat-icon">💰</div></div></div>
    </div>

    <div class="table-card">
      <div class="card-heading">Order History</div>
      <div id="orders-empty" class="empty-state" style="display:none">
        <div class="empty-icon">📋</div><div class="empty-text">No orders yet</div>
        <div class="empty-sub">Start shopping to see your orders here</div>
        <a href="/" class="btn mt-3" style="background:var(--primary);color:#fff;">Browse Products</a>
      </div>
      <div id="orders-table-wrap">
        <div class="table-responsive">
          <table class="table">
            <thead><tr><th>Order #</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/core/constants.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/utils.js"></script>
<script src="/js/components/nav.js"></script>
<script src="/js/pages/buyer/orders.js"></script>
<script src="/js/components/ai-chat.js"></script>
</body>
</html>
