<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cart — ShopHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
  <script>(function(){const s=localStorage.getItem('sh_session');if(!s){window.location.href='/login.html';return;}try{const p=JSON.parse(s);if(p.role!=='buyer')window.location.href='/login.html';}catch{window.location.href='/login.html';}})()</script>
</head>
<body>
<div id="sh-nav"></div>

<div class="dash-page">
  <div class="dash-content">
    <div class="dash-title">🛒 My Cart</div>
    <div class="dash-subtitle">Review your selected items before checkout</div>

    <div class="row g-4">
      <div class="col-md-8">
        <div id="cart-empty" class="empty-state" style="display:none">
          <div class="empty-icon">🛒</div>
          <div class="empty-text">Your cart is empty</div>
          <div class="empty-sub">Browse our products and add items to your cart</div>
          <a href="/" class="btn mt-3" style="background:var(--primary);color:#fff;">Browse Products</a>
        </div>
        <div id="cart-items"></div>
      </div>
      <div class="col-md-4">
        <div class="cart-summary" id="cart-summary" style="display:none">
          <div class="fw-bold mb-3" style="font-size:15px">Order Summary</div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Subtotal (<span id="sum-count">0</span> items)</span>
            <span id="sum-subtotal">¥0.00</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Shipping</span>
            <span class="text-success fw-bold">Free</span>
          </div>
          <hr/>
          <div class="d-flex justify-content-between mb-3 align-items-center">
            <span class="fw-bold">Total</span>
            <span class="cart-total" id="sum-total">¥0.00</span>
          </div>
          <a href="/pages/buyer/payment.html" class="btn w-100 fw-bold" style="background:var(--primary);color:#fff;padding:12px;border-radius:8px;">Proceed to Payment →</a>
          <a href="/" class="btn btn-outline-secondary w-100 mt-2 btn-sm">Continue Shopping</a>
          <div class="mt-3 p-3 rounded" style="background:#fff8f5;font-size:12px;color:#999">
            <i class="bi bi-shield-check text-success me-1"></i> Buyer Protection guaranteed.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/core/constants.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/utils.js"></script>
<script src="/js/components/nav.js"></script>
<script src="/js/pages/buyer/cart.js"></script>
<script src="/js/components/ai-chat.js"></script>
</body>
</html>
