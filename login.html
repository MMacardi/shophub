<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — ShopHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">ShopHub</div>
    <p class="auth-subtitle">Sign in to your account</p>

    <div id="error-msg" class="alert alert-danger py-2 d-none" role="alert"></div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" required autocomplete="username"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-auth mb-3">Sign In</button>
    </form>

    <div class="text-center text-muted small mb-3">
      Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:600;">Register Free</a>
    </div>

    <hr class="my-3"/>
    <div class="text-muted small text-center mb-2">Demo accounts:</div>
    <div class="row g-2">
      <div class="col-4">
        <div class="demo-box text-center p-2 border rounded" style="cursor:pointer;font-size:12px;" onclick="fillDemo('admin','admin123')">
          <div style="font-size:20px;">👑</div>
          <div class="fw-bold">Admin</div>
          <div class="text-muted">admin / admin123</div>
        </div>
      </div>
      <div class="col-4">
        <div class="demo-box text-center p-2 border rounded" style="cursor:pointer;font-size:12px;" onclick="fillDemo('seller1','123456')">
          <div style="font-size:20px;">🏪</div>
          <div class="fw-bold">Seller</div>
          <div class="text-muted">seller1 / 123456</div>
        </div>
      </div>
      <div class="col-4">
        <div class="demo-box text-center p-2 border rounded" style="cursor:pointer;font-size:12px;" onclick="fillDemo('buyer1','123456')">
          <div style="font-size:20px;">🛒</div>
          <div class="fw-bold">Buyer</div>
          <div class="text-muted">buyer1 / 123456</div>
        </div>
      </div>
    </div>
    <div class="text-center mt-3">
      <a href="index.html" class="text-muted small">← Back to Shop</a>
    </div>
  </div>
</div>

<script src="/js/core/constants.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/utils.js"></script>
<script src="/js/pages/login.js"></script>
</body>
</html>
