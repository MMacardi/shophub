<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ShopHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:500px">
    <div class="auth-logo">ShopHub</div>
    <p class="auth-subtitle">Create your free account</p>

    <div class="mb-4">
      <label class="form-label fw-bold">I want to:</label>
      <div class="row g-2">
        <div class="col-6">
          <button type="button" class="role-btn selected" id="role-buyer" onclick="selectRole('buyer')">
            <span class="role-emoji">🛒</span>
            <div class="role-name">Shop / Buy</div>
            <div class="role-desc">Browse &amp; purchase products</div>
          </button>
        </div>
        <div class="col-6">
          <button type="button" class="role-btn" id="role-seller" onclick="selectRole('seller')">
            <span class="role-emoji">🏪</span>
            <div class="role-name">Sell Products</div>
            <div class="role-desc">List &amp; sell your products</div>
          </button>
        </div>
      </div>
    </div>

    <div id="error-msg" class="alert alert-danger py-2 d-none"></div>

    <form id="register-form">
      <input type="hidden" id="selected-role" value="buyer"/>
      <div class="mb-3" id="shopname-field" style="display:none">
        <label class="form-label">Shop Name</label>
        <input type="text" id="shopname" class="form-control" placeholder="e.g. My Tech Store"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Choose a username" required autocomplete="username"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="your@email.com" required autocomplete="email"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password"/>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm-password" class="form-control" placeholder="Repeat your password" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn-auth mb-3">Create Account</button>
    </form>

    <div class="text-center text-muted small">
      Already have an account? <a href="/login.html" style="color:var(--primary);font-weight:600">Sign In</a>
    </div>
    <div class="text-center mt-2">
      <a href="/" class="text-muted small">← Back to Shop</a>
    </div>
  </div>
</div>

<script src="/js/core/constants.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/core/auth.js"></script>
<script src="/js/core/utils.js"></script>
<script src="/js/pages/register.js"></script>
</body>
</html>
